<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャッチ</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    overflow: hidden;
}

/* 上バー */
.top-bar {
    background: #00ff66;
    color: black;
    padding: 12px;
    text-align: center;
    font-weight: bold;
}

/* タイマー */
#timeBox {
    position: absolute;
    top: 50px;
    left: 10px;
}

/* スコア */
#scoreBox {
    position: absolute;
    top: 50px;
    right: 10px;
}

/* 落下エリア（超重要） */
#fallArea {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* プレイヤー */
#player {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<div class="top-bar">
    キャッチ
</div>

<div id="timeBox">
    ⏱ <span id="time">25</span>
</div>

<div id="scoreBox">
    ⭐ <span id="score">0</span>
</div>

<div id="fallArea"></div>

<img id="player" src="catch.png" width="80">

<script src="catch.js"></script>

<script>
window.onload = () => {
    console.log("読み込みOK"); // ←確認用
    startCatchGame();
};
</script>

</body>
</html>
